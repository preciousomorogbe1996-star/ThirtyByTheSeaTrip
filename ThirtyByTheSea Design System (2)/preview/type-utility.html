<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Glacial Indifference';
  src: url('../fonts/GlacialIndifference-Bold.otf') format('opentype');
  font-weight: 700;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #C4A87A; padding: 24px 28px; width: 700px; }
.label { font-family: 'Glacial Indifference', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(26,16,8,0.4); margin-bottom: 4px; }
.row { margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Hashtag Watermark</div>
    <div style="font-family:'Bebas Neue',sans-serif; font-size:36px; color:rgba(180,150,100,0.35); letter-spacing:0.02em;">#THIRTYBYTHESEA</div>
  </div>
  <div class="row">
    <div class="label">Hashtag Label — Small Identifier (Glacial Indifference)</div>
    <div style="font-family:'Glacial Indifference',sans-serif; font-weight:700; font-size:11px; color:rgba(255,255,255,0.55); letter-spacing:0.2em; text-transform:uppercase;">#THIRTYBYTHESEA</div>
  </div>
  <div class="row">
    <div class="label">Caption / Footer Text (Glacial Indifference)</div>
    <div style="font-family:'Glacial Indifference',sans-serif; font-weight:700; font-size:11px; color:rgba(255,255,255,0.6); letter-spacing:0.18em; text-transform:uppercase;">19TH MAY 2026 · LONDON → ALBANIA</div>
  </div>
  <div class="row">
    <div class="label">Price / Callout — Bebas Neue Bold Accent</div>
    <div style="font-family:'Bebas Neue',sans-serif; font-size:42px; color:#fff; letter-spacing:0.02em;">TOTAL FOR THE TRIP — £750.15</div>
  </div>
</body>
</html>
