<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: 'Glacial Indifference';
  src: url('../fonts/GlacialIndifference-Bold.otf') format('opentype');
  font-weight: 700;
}
</style>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1A1008; padding: 24px; width: 700px; display: flex; flex-direction: column; gap: 16px; }
.card { background: #C4A87A; padding: 20px 24px; position: relative; overflow: hidden; }
.label { font-family: 'Glacial Indifference', sans-serif, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; color: rgba(26,16,8,0.45); text-transform: uppercase; margin-bottom: 4px; }
.wm { position: absolute; bottom: -10px; right: -10px; font-family: 'Bebas Neue', sans-serif; font-size: 50px; color: rgba(180,150,100,0.25); white-space: nowrap; }
</style>
</head>
<body>
  <div class="label" style="color:rgba(255,255,255,0.4)">Background Treatments</div>

  <!-- Primary sand bg -->
  <div class="card">
    <div class="label">Primary — Sand #C4A87A</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff;">THE IMPORTANT STUFF</div>
    <div class="wm">#THIRTYBYTHESEA</div>
  </div>

  <!-- Dark divider section -->
  <div style="background:#1A1008; padding: 14px 24px;">
    <div style="font-family:'Glacial Indifference', sans-serif,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;color:rgba(255,255,255,0.4);text-transform:uppercase;">Dark Divider — #1A1008</div>
  </div>

  <!-- Photo section mockup -->
  <div style="background: linear-gradient(135deg, #5B8FA8, #3A7A6A); padding: 20px 24px; position:relative;">
    <div style="font-family:'Glacial Indifference', sans-serif,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.15em;color:rgba(255,255,255,0.6);text-transform:uppercase; margin-bottom:6px;">Full-Bleed Photo Panel</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;">19<sup style="font-size:14px">TH</sup> MAY 2026 TO 26<sup style="font-size:14px">TH</sup> MAY 2026</div>
    <div style="position:absolute;bottom:8px;right:14px;font-family:'Glacial Indifference', sans-serif,sans-serif;font-size:10px;font-weight:700;letter-spacing:0.18em;color:rgba(255,255,255,0.45);text-transform:uppercase;">#THIRTYBYTHESEA</div>
  </div>
</body>
</html>
