<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: 'Glacial Indifference';
  src: url('../fonts/GlacialIndifference-Bold.otf') format('opentype');
  font-weight: 700;
}
</style>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #C4A87A; padding: 28px; width: 700px; display: flex; align-items: center; gap: 40px; }
.icon-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.icon-label { font-family: 'Glacial Indifference', sans-serif, sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.6); text-align: center; }
svg { display: block; }
</style>
</head>
<body>
  <!-- Palm Tree -->
  <div class="icon-group">
    <svg width="70" height="80" viewBox="0 0 70 80" fill="none">
      <path d="M35 75 L35 35" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M35 35 Q20 20 5 25 Q15 35 35 35" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
      <path d="M35 35 Q50 20 65 25 Q55 35 35 35" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
      <path d="M35 38 Q18 28 8 15 Q22 28 35 38" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
      <path d="M35 38 Q52 28 62 15 Q48 28 35 38" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
      <path d="M35 40 Q35 20 28 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="35" cy="76" rx="10" ry="3" fill="rgba(255,255,255,0.2)"/>
    </svg>
    <div class="icon-label">Palm Tree</div>
  </div>

  <!-- Airplane Ticket -->
  <div class="icon-group">
    <svg width="80" height="60" viewBox="0 0 80 60" fill="none">
      <rect x="4" y="14" width="72" height="32" rx="3" stroke="white" stroke-width="2.5"/>
      <path d="M4 30 L76 30" stroke="white" stroke-width="1.5" stroke-dasharray="4 3"/>
      <path d="M58 14 L58 46" stroke="white" stroke-width="2"/>
      <path d="M20 22 L45 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 38 L45 38" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M25 26 L20 22 L25 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="icon-label">Flight Ticket</div>
  </div>

  <!-- Car -->
  <div class="icon-group">
    <svg width="90" height="60" viewBox="0 0 90 60" fill="none">
      <path d="M10 38 L10 46 Q10 50 14 50 L18 50 Q22 50 22 46 L22 42 L68 42 L68 46 Q68 50 72 50 L76 50 Q80 50 80 46 L80 38" stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
      <path d="M10 38 L18 20 Q20 14 28 14 L62 14 Q70 14 72 20 L80 38" stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
      <path d="M22 28 L28 18 L62 18 L68 28 Z" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.12)"/>
      <circle cx="22" cy="46" r="6" stroke="white" stroke-width="2.5" fill="none"/>
      <circle cx="68" cy="46" r="6" stroke="white" stroke-width="2.5" fill="none"/>
      <path d="M6 38 L84 38" stroke="white" stroke-width="2"/>
    </svg>
    <div class="icon-label">Car</div>
  </div>

  <!-- Location / House -->
  <div class="icon-group">
    <svg width="60" height="80" viewBox="0 0 60 80" fill="none">
      <path d="M30 8 C14 8 8 22 8 30 C8 50 30 72 30 72 C30 72 52 50 52 30 C52 22 46 8 30 8Z" stroke="white" stroke-width="2.5" fill="none"/>
      <circle cx="30" cy="30" r="10" stroke="white" stroke-width="2.5" fill="none"/>
      <path d="M25 27 L28 30 L35 23" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="icon-label">Location</div>
  </div>

  <!-- Camera -->
  <div class="icon-group">
    <svg width="80" height="65" viewBox="0 0 80 65" fill="none">
      <rect x="6" y="18" width="68" height="44" rx="5" stroke="white" stroke-width="2.5" fill="none"/>
      <path d="M24 18 L30 8 L50 8 L56 18" stroke="white" stroke-width="2.5" fill="none"/>
      <circle cx="40" cy="38" r="14" stroke="white" stroke-width="2.5" fill="none"/>
      <circle cx="40" cy="38" r="7" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.1)"/>
      <circle cx="62" cy="26" r="4" stroke="white" stroke-width="2" fill="none"/>
    </svg>
    <div class="icon-label">Camera</div>
  </div>
</body>
</html>
