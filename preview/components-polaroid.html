<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: 'Glacial Indifference';
  src: url('../fonts/GlacialIndifference-Bold.otf') format('opentype');
  font-weight: 700;
}
</style>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #C4A87A; padding: 28px; width: 700px; display: flex; gap: 28px; align-items: flex-start; }
.label { font-family: 'Glacial Indifference', sans-serif, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(26,16,8,0.4); margin-bottom: 8px; }

/* Polaroid */
.polaroid { background: #fff; padding: 8px 8px 28px 8px; position: relative; display: inline-block; transform: rotate(-2deg); }
.polaroid-tape { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 50px; height: 10px; background: rgba(255,255,255,0.75); }
.polaroid img, .polaroid-img { width: 140px; height: 100px; background: linear-gradient(135deg,#5B9EC9,#3A8A6A); display: block; }

/* Scrapbook letter */
.ransom { display: flex; gap: 2px; align-items: flex-end; }
.ransom span { font-weight: 900; padding: 2px 5px; font-size: 28px; line-height: 1; }
</style>
</head>
<body>
  <div>
    <div class="label">Polaroid Photo Frame</div>
    <div style="display:flex; gap:16px; align-items:flex-start;">
      <div class="polaroid" style="transform:rotate(-3deg)">
        <div class="polaroid-tape"></div>
        <div class="polaroid-img" style="background:linear-gradient(135deg,#4A9EC9 0%,#2A7A5A 100%);"></div>
      </div>
      <div class="polaroid" style="transform:rotate(2deg); margin-top:10px;">
        <div class="polaroid-tape"></div>
        <div class="polaroid-img" style="background:linear-gradient(135deg,#C48A5A 0%,#6A9E8A 100%);"></div>
      </div>
      <div class="polaroid" style="transform:rotate(-1deg); margin-top:5px;">
        <div class="polaroid-tape"></div>
        <div class="polaroid-img" style="background:linear-gradient(135deg,#8A9EC9 0%,#5A7A9A 100%);"></div>
      </div>
    </div>
  </div>

  <div style="flex:1">
    <div class="label" style="margin-top:0">Ransom-Note / Cut-Out Letters</div>
    <div class="ransom">
      <span style="background:#E8C840;color:#1A1008;font-family:'Bebas Neue',sans-serif;transform:rotate(-3deg)">t</span>
      <span style="background:#6B4FA0;color:#fff;font-family:'Glacial Indifference', sans-serif,sans-serif;transform:rotate(2deg)">r</span>
      <span style="background:#fff;color:#3A6B45;font-family:'Glacial Indifference', sans-serif,sans-serif;font-style:italic;transform:rotate(-1deg)">i</span>
      <span style="background:#3A6AA0;color:#fff;font-family:'Bebas Neue',sans-serif;transform:rotate(3deg)">p</span>
    </div>
    <div class="label" style="margin-top:20px">Hashtag Watermark</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:rgba(180,150,100,0.35);letter-spacing:0.02em;">#THIRTYBYTHESEA</div>
    <div class="label" style="margin-top:16px">Page Identifier Tag</div>
    <div style="font-family:'Glacial Indifference', sans-serif,sans-serif;font-weight:700;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.22em;text-transform:uppercase;">#THIRTYBYTHESEA</div>
  </div>
</body>
</html>
