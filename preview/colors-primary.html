<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: 'Glacial Indifference';
  src: url('../fonts/GlacialIndifference-Bold.otf') format('opentype');
  font-weight: 700;
}
</style>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1A1008; font-family: 'Glacial Indifference', sans-serif, sans-serif; padding: 20px; width: 700px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
.swatch { flex: 1; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
.swatch-name { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.swatch-hex  { font-size: 9px; opacity: 0.7; letter-spacing: 0.05em; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#C4A87A;"><span class="swatch-name" style="color:#1A1008">Sand</span><span class="swatch-hex" style="color:#1A1008">#C4A87A</span></div>
  <div class="swatch" style="background:#B08F60;"><span class="swatch-name" style="color:#fff">Sand Dark</span><span class="swatch-hex" style="color:#fff">#B08F60</span></div>
  <div class="swatch" style="background:#D9C4A0;"><span class="swatch-name" style="color:#1A1008">Sand Light</span><span class="swatch-hex" style="color:#1A1008">#D9C4A0</span></div>
  <div class="swatch" style="background:#EDE0CB;"><span class="swatch-name" style="color:#1A1008">Sand XLight</span><span class="swatch-hex" style="color:#1A1008">#EDE0CB</span></div>
  <div class="swatch" style="background:#FFFFFF; border: 1px solid #C4A87A;"><span class="swatch-name" style="color:#1A1008">White</span><span class="swatch-hex" style="color:#1A1008">#FFFFFF</span></div>
  <div class="swatch" style="background:#1A1008;"><span class="swatch-name" style="color:#fff">Dark</span><span class="swatch-hex" style="color:#fff">#1A1008</span></div>
</div>
<div class="row">
  <div class="swatch" style="background:#E8C840; flex: 0.7;"><span class="swatch-name" style="color:#1A1008">Collage Yellow</span><span class="swatch-hex" style="color:#1A1008">#E8C840</span></div>
  <div class="swatch" style="background:#6B4FA0; flex: 0.7;"><span class="swatch-name" style="color:#fff">Collage Purple</span><span class="swatch-hex" style="color:#fff">#6B4FA0</span></div>
  <div class="swatch" style="background:#3A6B45; flex: 0.7;"><span class="swatch-name" style="color:#fff">Collage Green</span><span class="swatch-hex" style="color:#fff">#3A6B45</span></div>
  <div class="swatch" style="background:#C03030; flex: 0.7;"><span class="swatch-name" style="color:#fff">Collage Red</span><span class="swatch-hex" style="color:#fff">#C03030</span></div>
  <div class="swatch" style="background:#3A6AA0; flex: 0.7;"><span class="swatch-name" style="color:#fff">Collage Blue</span><span class="swatch-hex" style="color:#fff">#3A6AA0</span></div>
</div>
</body>
</html>
