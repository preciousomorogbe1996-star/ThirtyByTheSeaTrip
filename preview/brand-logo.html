<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: 'Glacial Indifference';
  src: url('../fonts/GlacialIndifference-Bold.otf') format('opentype');
  font-weight: 700;
}
</style>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1A1008; padding: 28px; width: 700px; display: flex; gap: 20px; align-items: stretch; }

.panel { background: #C4A87A; padding: 24px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; }
.panel-dark { background: #1A1008; border: 1px solid #3A2A18; padding: 24px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; }

.logo { display: flex; align-items: center; gap: 12px; }
.logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #fff; line-height: 1; letter-spacing: -0.01em; }
.tag { font-family: 'Glacial Indifference', sans-serif, sans-serif; font-weight: 700; font-size: 10px; color: rgba(255,255,255,0.55); letter-spacing: 0.22em; text-transform: uppercase; }
</style>
</head>
<body>
  <!-- On Sand -->
  <div class="panel">
    <div class="tag">PRIMARY — ON SAND</div>
    <div class="logo">
      <svg width="40" height="48" viewBox="0 0 40 60" fill="none">
        <path d="M20 55 L20 28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 28 Q10 16 2 20 Q10 26 20 28" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
        <path d="M20 28 Q30 16 38 20 Q30 26 20 28" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
        <path d="M20 30 Q10 22 4 12 Q14 22 20 30" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
        <path d="M20 30 Q30 22 36 12 Q26 22 20 30" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)" stroke-linejoin="round"/>
        <ellipse cx="20" cy="56" rx="8" ry="2.5" fill="rgba(255,255,255,0.2)"/>
      </svg>
      <div class="logo-text">#THIRTYBYTHESEA</div>
    </div>
    <div class="tag">#PRESHSCHILLFLIRTY30</div>
  </div>

  <!-- On Dark -->
  <div class="panel-dark">
    <div class="tag">ON DARK</div>
    <div class="logo">
      <svg width="40" height="48" viewBox="0 0 40 60" fill="none">
        <path d="M20 55 L20 28" stroke="#C4A87A" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 28 Q10 16 2 20 Q10 26 20 28" stroke="#C4A87A" stroke-width="2" fill="rgba(196,168,122,0.15)"/>
        <path d="M20 28 Q30 16 38 20 Q30 26 20 28" stroke="#C4A87A" stroke-width="2" fill="rgba(196,168,122,0.15)"/>
        <path d="M20 30 Q10 22 4 12 Q14 22 20 30" stroke="#C4A87A" stroke-width="2" fill="rgba(196,168,122,0.15)"/>
        <path d="M20 30 Q30 22 36 12 Q26 22 20 30" stroke="#C4A87A" stroke-width="2" fill="rgba(196,168,122,0.15)"/>
        <ellipse cx="20" cy="56" rx="8" ry="2.5" fill="rgba(196,168,122,0.2)"/>
      </svg>
      <div class="logo-text" style="color:#C4A87A">#THIRTYBYTHESEA</div>
    </div>
    <div class="tag">#PRESHSCHILLFLIRTY30</div>
  </div>

  <!-- Watermark -->
  <div class="panel" style="background:#B08F60;">
    <div class="tag">WATERMARK / GHOST</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(180,150,100,0.35);letter-spacing:0.02em;">#THIRTYBYTHESEA</div>
    <div style="font-family:'Glacial Indifference', sans-serif,sans-serif;font-weight:700;font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:0.22em;text-transform:uppercase;">#THIRTYBYTHESEA</div>
  </div>
</body>
</html>
